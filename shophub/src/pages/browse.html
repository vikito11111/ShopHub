<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub - Browse</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div id="navbar-root"></div>
    <main class="py-4 py-lg-5">
      <section class="container">
        <div class="bg-white border shadow-sm rounded-4 p-4 mb-4 browse-filter-bar">
          <div class="d-flex flex-column flex-lg-row gap-3 justify-content-between align-items-lg-end mb-3">
            <div>
              <h1 class="h3 mb-1">Browse Products</h1>
              <p class="text-secondary mb-0">Search listings by title and filter by category.</p>
            </div>
            <span id="browse-results-count" class="badge rounded-pill text-bg-light border px-3 py-2">0 results</span>
          </div>

          <form id="browse-search-form" class="row g-3">
            <div class="col-12 col-lg-9">
              <label for="browse-search-input" class="form-label">Search by title</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input
                  id="browse-search-input"
                  type="search"
                  class="form-control"
                  placeholder="Try: jacket, lamp, headphones"
                />
              </div>
            </div>
            <div class="col-12 col-lg-3 d-grid align-self-end">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-funnel me-1"></i>Apply
              </button>
            </div>
            <div class="col-12">
              <label for="browse-category-select" class="form-label mb-2">Category</label>
              <div class="row g-2 align-items-center mb-2">
                <div class="col-12 col-lg-5">
                  <div class="input-group input-group-sm">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input
                      id="browse-category-search"
                      type="search"
                      class="form-control"
                      placeholder="Search categories"
                    />
                  </div>
                </div>
              </div>
              <div class="browse-category-rail">
                <div id="browse-category-pills" class="d-flex flex-nowrap gap-2">
                  <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill active" data-category="">
                    All categories
                  </button>
                </div>
              </div>
              <select id="browse-category-select" class="form-select d-none" aria-hidden="true" tabindex="-1">
                <option value="">All categories</option>
              </select>
            </div>
          </form>
        </div>

        <div id="browse-products-loading" class="py-3">
          <div class="row g-3">
            <div class="col-12 col-md-6 col-lg-4">
              <div class="card border-0 shadow-sm browse-skeleton-card">
                <div class="placeholder-glow">
                  <div class="placeholder w-100 browse-skeleton-image"></div>
                  <div class="card-body">
                    <span class="placeholder col-8 mb-2"></span>
                    <span class="placeholder col-12 mb-2"></span>
                    <span class="placeholder col-10 mb-3"></span>
                    <span class="placeholder col-4"></span>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
              <div class="card border-0 shadow-sm browse-skeleton-card">
                <div class="placeholder-glow">
                  <div class="placeholder w-100 browse-skeleton-image"></div>
                  <div class="card-body">
                    <span class="placeholder col-8 mb-2"></span>
                    <span class="placeholder col-12 mb-2"></span>
                    <span class="placeholder col-10 mb-3"></span>
                    <span class="placeholder col-4"></span>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
              <div class="card border-0 shadow-sm browse-skeleton-card">
                <div class="placeholder-glow">
                  <div class="placeholder w-100 browse-skeleton-image"></div>
                  <div class="card-body">
                    <span class="placeholder col-8 mb-2"></span>
                    <span class="placeholder col-12 mb-2"></span>
                    <span class="placeholder col-10 mb-3"></span>
                    <span class="placeholder col-4"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="browse-products-error" class="alert alert-danger d-none" role="alert">
          We could not load products right now. Please try again shortly.
        </div>

        <div id="browse-products-empty" class="alert alert-info d-none" role="alert">
          No products match your filters.
        </div>

        <div id="browse-products-grid" class="row g-3"></div>
      </section>
    </main>
    <div id="footer-root"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/browse.js"></script>
    <script type="module" src="../js/footer.js"></script>
  </body>
</html>

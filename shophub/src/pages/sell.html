<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub - Sell</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div id="navbar-root"></div>
    <main class="py-4 py-lg-5">
      <section class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-9 col-xl-8">
            <div class="bg-white border shadow-sm rounded-4 p-4 p-lg-5">
              <h1 id="sell-page-title" class="h3 mb-2">Create Listing</h1>
              <p id="sell-page-subtitle" class="text-secondary mb-4">
                Add your product details to publish a new listing.
              </p>

              <div id="sell-alert" class="alert d-none" role="alert"></div>

              <form id="sell-form" class="row g-3">
                <div class="col-12">
                  <label for="sell-title" class="form-label">Title</label>
                  <input id="sell-title" type="text" class="form-control" maxlength="120" required />
                </div>

                <div class="col-12">
                  <label for="sell-description" class="form-label">Description</label>
                  <textarea
                    id="sell-description"
                    class="form-control"
                    rows="5"
                    maxlength="2000"
                    required
                  ></textarea>
                </div>

                <div class="col-12 col-md-6">
                  <label for="sell-price" class="form-label">Price (USD)</label>
                  <input
                    id="sell-price"
                    type="number"
                    class="form-control"
                    min="0.01"
                    step="0.01"
                    required
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label for="sell-category" class="form-label">Category</label>
                  <select id="sell-category" class="form-select" required>
                    <option value="" selected disabled>Select a category</option>
                  </select>
                </div>

                <div class="col-12">
                  <label for="sell-image" class="form-label">Product image</label>
                  <input id="sell-image" type="file" class="form-control" accept="image/*" />
                </div>

                <div id="current-image-wrap" class="col-12 d-none">
                  <p class="small text-secondary mb-2">Current image</p>
                  <img id="current-image" src="" alt="Current product" class="img-fluid rounded sell-current-image" />
                </div>

                <div class="col-12 d-grid d-md-flex justify-content-md-end mt-3">
                  <button id="sell-submit-btn" type="submit" class="btn btn-primary px-4">
                    <span id="sell-submit-spinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
                    <span id="sell-submit-text">Publish Listing</span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div id="footer-root"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/sell.js"></script>
    <script type="module" src="../js/footer.js"></script>
  </body>
</html>

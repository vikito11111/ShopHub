<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub - Profile</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div id="navbar-root"></div>
    <main class="py-4 py-lg-5">
      <section class="container">
        <div id="profile-alert" class="alert d-none" role="alert"></div>

        <div class="bg-white border shadow-sm rounded-4 p-4 mb-4">
          <div class="row g-4 align-items-center">
            <div class="col-12 col-md-auto text-center">
              <img id="profile-avatar" src="" alt="User avatar" class="profile-avatar rounded-circle border" />
            </div>
            <div class="col-12 col-md">
              <h1 id="profile-username" class="h3 mb-2">User</h1>
              <p class="text-secondary mb-3">Manage your avatar and listings.</p>
              <div class="input-group profile-avatar-actions">
                <input id="profile-avatar-input" class="form-control" type="file" accept="image/*" />
                <button id="profile-avatar-btn" type="button" class="btn btn-primary text-nowrap">
                  <span id="profile-avatar-spinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
                  Update Avatar
                </button>
              </div>
            </div>
          </div>
        </div>

        <section>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">My Listings</h2>
            <a href="./sell.html" class="btn btn-primary btn-sm">
              <i class="bi bi-plus-lg me-1"></i>New Listing
            </a>
          </div>

          <div id="profile-products-loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
            <p class="text-secondary mt-3 mb-0">Loading your listings...</p>
          </div>

          <div id="profile-products-error" class="alert alert-danger d-none" role="alert">
            We could not load your listings right now.
          </div>

          <div id="profile-products-empty" class="alert alert-info d-none" role="alert">
            You have no listings yet.
          </div>

          <div id="profile-products-grid" class="row g-4"></div>
        </section>
      </section>
    </main>
    <div id="footer-root"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/profile-page.js"></script>
    <script type="module" src="../js/footer.js"></script>
  </body>
</html>

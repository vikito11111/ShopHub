<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub - Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div id="navbar-root"></div>
    <main class="py-4 py-lg-5 d-flex align-items-center auth-main">
      <section class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-5">
            <article class="card border-0 shadow-sm">
              <div class="card-body p-4 p-lg-5">
                <h1 class="h3 mb-2">Create your account</h1>
                <p class="text-secondary mb-4">Start listing and discovering products on ShopHub.</p>

                <div id="register-form-error" class="alert alert-danger d-none" role="alert"></div>

                <form id="register-form" novalidate>
                  <div class="mb-3">
                    <label for="register-email" class="form-label">Email</label>
                    <input id="register-email" type="email" class="form-control" autocomplete="email" />
                    <div id="register-email-error" class="form-text text-danger"></div>
                  </div>

                  <div class="mb-3">
                    <label for="register-password" class="form-label">Password</label>
                    <input
                      id="register-password"
                      type="password"
                      class="form-control"
                      autocomplete="new-password"
                    />
                    <div id="register-password-error" class="form-text text-danger"></div>
                  </div>

                  <div class="mb-3">
                    <label for="register-confirm-password" class="form-label">Confirm password</label>
                    <input
                      id="register-confirm-password"
                      type="password"
                      class="form-control"
                      autocomplete="new-password"
                    />
                    <div id="register-confirm-password-error" class="form-text text-danger"></div>
                  </div>

                  <button id="register-submit-btn" type="submit" class="btn btn-primary w-100 mt-2">
                    <span id="register-submit-spinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
                    <span id="register-submit-text">Create Account</span>
                  </button>
                </form>

                <p class="text-secondary small mb-0 mt-4">
                  Already have an account?
                  <a href="./login.html" class="text-decoration-none">Sign in</a>
                </p>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>
    <div id="footer-root"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/register.js"></script>
    <script type="module" src="../js/footer.js"></script>
  </body>
</html>

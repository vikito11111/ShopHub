<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub - Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div id="navbar-root"></div>
    <main class="py-4 py-lg-5">
      <section class="container">
        <div id="admin-loading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
          <p class="text-secondary mt-3 mb-0">Loading admin dashboard...</p>
        </div>

        <div id="admin-content" class="d-none">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 mb-0"><i class="bi bi-speedometer2 me-2"></i>Admin Dashboard</h1>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-12 col-md-4">
              <article class="card border-0 shadow-sm admin-stat-card admin-stat-users">
                <div class="card-body">
                  <p class="text-secondary mb-1"><i class="bi bi-people-fill me-1"></i>Total Users</p>
                  <p id="admin-stat-users" class="h3 mb-0">0</p>
                </div>
              </article>
            </div>
            <div class="col-12 col-md-4">
              <article class="card border-0 shadow-sm admin-stat-card admin-stat-products">
                <div class="card-body">
                  <p class="text-secondary mb-1"><i class="bi bi-box-seam me-1"></i>Total Products</p>
                  <p id="admin-stat-products" class="h3 mb-0">0</p>
                </div>
              </article>
            </div>
            <div class="col-12 col-md-4">
              <article class="card border-0 shadow-sm admin-stat-card admin-stat-orders">
                <div class="card-body">
                  <p class="text-secondary mb-1"><i class="bi bi-receipt-cutoff me-1"></i>Total Orders</p>
                  <p id="admin-stat-orders" class="h3 mb-0">0</p>
                </div>
              </article>
            </div>
          </div>

          <section class="card border-0 shadow-sm mb-4 admin-table-card">
            <div class="card-body">
              <h2 class="h5 mb-3"><i class="bi bi-person-gear me-2"></i>Users & Roles</h2>
              <div class="table-responsive">
                <table class="table table-hover table-striped align-middle mb-0 admin-table">
                  <thead>
                    <tr>
                      <th>Username</th>
                      <th>User ID</th>
                      <th>Role</th>
                      <th class="text-end">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="admin-users-table-body"></tbody>
                </table>
              </div>
            </div>
          </section>

          <section class="card border-0 shadow-sm admin-table-card">
            <div class="card-body">
              <h2 class="h5 mb-3"><i class="bi bi-shield-check me-2"></i>Product Moderation</h2>
              <div class="table-responsive">
                <table class="table table-hover table-striped align-middle mb-0 admin-table">
                  <thead>
                    <tr>
                      <th>Image</th>
                      <th>Title</th>
                      <th>Price</th>
                      <th>Status</th>
                      <th>Seller</th>
                      <th class="text-end">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="admin-products-table-body"></tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
    <div id="footer-root"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/admin-page.js"></script>
    <script type="module" src="../js/footer.js"></script>
  </body>
</html>

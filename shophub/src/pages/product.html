<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub - Product</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div id="navbar-root"></div>
    <main class="py-4 py-lg-5">
      <section class="container">
        <div id="product-loading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
          <p class="text-secondary mt-3 mb-0">Loading product details...</p>
        </div>

        <div id="product-error" class="alert alert-danger d-none" role="alert"></div>

        <article id="product-details-card" class="card border-0 shadow-sm d-none">
          <div class="row g-0">
            <div class="col-12 col-lg-6">
              <img id="product-image" src="" alt="Product image" class="product-detail-image w-100 h-100 product-image-zoom" />
            </div>
            <div class="col-12 col-lg-6">
              <div class="card-body p-4 p-xl-5 d-flex flex-column h-100">
                <div class="d-flex align-items-center gap-2 flex-wrap mb-3">
                  <h1 id="product-title" class="h3 mb-0"></h1>
                  <span id="product-average-rating" class="badge text-bg-light border d-none"></span>
                </div>
                <p id="product-description" class="text-secondary mb-4"></p>

                <div class="mb-3">
                  <span class="text-secondary d-block small">Price</span>
                  <span id="product-price" class="h4 mb-0"></span>
                </div>

                <div class="mb-3">
                  <span class="text-secondary d-block small">Quantity</span>
                  <span id="product-quantity" class="fw-semibold"></span>
                </div>

                <div class="mb-4">
                  <span class="text-secondary d-block small">Seller</span>
                  <span id="product-seller" class="fw-semibold"></span>
                </div>

                <div class="mt-auto d-flex flex-wrap gap-2">
                  <button id="buy-now-btn" type="button" class="btn btn-primary d-none">
                    <i class="bi bi-bag-check me-1"></i>Buy Now
                  </button>

                  <button id="wishlist-toggle-btn" type="button" class="btn btn-outline-danger d-none">
                    <i class="bi bi-heart me-1"></i>
                    <span id="wishlist-toggle-label">Save to Wishlist</span>
                  </button>

                  <span id="sold-message" class="badge text-bg-danger d-none">Sold Out</span>

                  <div id="seller-actions" class="d-none d-flex flex-wrap gap-2">
                    <a id="edit-product-btn" href="#" class="btn btn-outline-primary">
                      <i class="bi bi-pencil-square me-1"></i>Edit
                    </a>
                    <button id="delete-product-btn" type="button" class="btn btn-outline-danger">
                      <i class="bi bi-trash me-1"></i>Delete
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </article>

        <section id="related-products-section" class="mt-4 d-none">
          <div class="d-flex align-items-center gap-3 mb-3">
            <h2 class="h4 mb-0">Related Products</h2>
            <hr class="flex-grow-1 my-0" />
          </div>
          <div id="related-products-grid" class="row g-4"></div>
        </section>

        <section id="product-reviews-section" class="mt-4 d-none">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-lg-5">
              <h2 class="h4 mb-3"><i class="bi bi-chat-square-text me-2"></i>Reviews</h2>

              <div id="review-form-wrap" class="mb-4 d-none">
                <h3 class="h6 mb-3">Leave a Review</h3>
                <form id="review-form" class="row g-3">
                  <div class="col-12">
                    <label class="form-label d-block mb-2">Your Rating</label>
                    <div id="review-rating-stars" class="d-flex gap-1" role="radiogroup" aria-label="Rating">
                      <button type="button" class="btn btn-sm btn-outline-warning review-star" data-value="1" aria-label="1 star"><i class="bi bi-star-fill"></i></button>
                      <button type="button" class="btn btn-sm btn-outline-warning review-star" data-value="2" aria-label="2 stars"><i class="bi bi-star-fill"></i></button>
                      <button type="button" class="btn btn-sm btn-outline-warning review-star" data-value="3" aria-label="3 stars"><i class="bi bi-star-fill"></i></button>
                      <button type="button" class="btn btn-sm btn-outline-warning review-star" data-value="4" aria-label="4 stars"><i class="bi bi-star-fill"></i></button>
                      <button type="button" class="btn btn-sm btn-outline-warning review-star" data-value="5" aria-label="5 stars"><i class="bi bi-star-fill"></i></button>
                    </div>
                    <input id="review-rating-input" type="hidden" value="0" />
                  </div>

                  <div class="col-12">
                    <label for="review-comment" class="form-label">Comment</label>
                    <textarea id="review-comment" class="form-control" rows="4" maxlength="2000" required></textarea>
                  </div>

                  <div class="col-12 d-flex justify-content-end">
                    <button id="review-submit-btn" type="submit" class="btn btn-primary">
                      <span id="review-submit-spinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
                      Submit Review
                    </button>
                  </div>
                </form>
              </div>

              <div id="review-eligibility-message" class="alert alert-info d-none" role="alert"></div>

              <div id="reviews-loading" class="text-center py-4 d-none">
                <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
                <p class="text-secondary mt-3 mb-0">Loading reviews...</p>
              </div>

              <div id="reviews-empty" class="alert alert-info d-none" role="alert">
                No reviews yet.
              </div>

              <div id="reviews-list" class="d-grid gap-3"></div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div class="modal fade" id="productImageModal" tabindex="-1" aria-labelledby="productImageModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 bg-transparent">
          <div class="modal-header border-0 pb-0">
            <h2 id="productImageModalLabel" class="visually-hidden">Full product image</h2>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body pt-0 text-center">
            <img id="product-image-modal-src" src="" alt="Full product image" class="img-fluid rounded shadow" />
          </div>
        </div>
      </div>
    </div>

    <div id="footer-root"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/product-detail.js"></script>
    <script type="module" src="../js/footer.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub - Product</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div id="navbar-root"></div>
    <main class="py-4 py-lg-5">
      <section class="container">
        <div id="product-alert" class="alert d-none" role="alert"></div>

        <div id="product-loading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
          <p class="text-secondary mt-3 mb-0">Loading product details...</p>
        </div>

        <div id="product-error" class="alert alert-danger d-none" role="alert"></div>

        <article id="product-details-card" class="card border-0 shadow-sm d-none">
          <div class="row g-0">
            <div class="col-12 col-lg-6">
              <img id="product-image" src="" alt="Product image" class="product-detail-image w-100 h-100" />
            </div>
            <div class="col-12 col-lg-6">
              <div class="card-body p-4 p-xl-5 d-flex flex-column h-100">
                <h1 id="product-title" class="h3 mb-3"></h1>
                <p id="product-description" class="text-secondary mb-4"></p>

                <div class="mb-3">
                  <span class="text-secondary d-block small">Price</span>
                  <span id="product-price" class="h4 mb-0"></span>
                </div>

                <div class="mb-4">
                  <span class="text-secondary d-block small">Seller</span>
                  <span id="product-seller" class="fw-semibold"></span>
                </div>

                <div class="mt-auto d-flex flex-wrap gap-2">
                  <button id="buy-now-btn" type="button" class="btn btn-primary d-none">
                    <i class="bi bi-bag-check me-1"></i>Buy Now
                  </button>

                  <div id="seller-actions" class="d-none d-flex flex-wrap gap-2">
                    <a id="edit-product-btn" href="#" class="btn btn-outline-primary">
                      <i class="bi bi-pencil-square me-1"></i>Edit
                    </a>
                    <button id="delete-product-btn" type="button" class="btn btn-outline-danger">
                      <i class="bi bi-trash me-1"></i>Delete
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </article>
      </section>
    </main>
    <div id="footer-root"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/product-detail.js"></script>
    <script type="module" src="../js/footer.js"></script>
  </body>
</html>

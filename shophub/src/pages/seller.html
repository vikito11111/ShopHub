<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub - Seller</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div id="navbar-root"></div>

    <main class="py-4 py-lg-5">
      <section class="container">
        <div id="seller-loading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
          <p class="text-secondary mt-3 mb-0">Loading seller profile...</p>
        </div>

        <div id="seller-error" class="alert alert-danger d-none" role="alert"></div>

        <section id="seller-content" class="d-none">
          <article class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4 p-lg-5">
              <div class="d-flex flex-column flex-md-row align-items-md-center gap-3">
                <img
                  id="seller-avatar"
                  src="https://placehold.co/160x160?text=Seller"
                  alt="Seller avatar"
                  class="profile-avatar"
                />
                <div class="flex-grow-1">
                  <p class="text-secondary text-uppercase small mb-2">Seller</p>
                  <h1 id="seller-username" class="h3 mb-2">Seller Profile</h1>
                  <p id="seller-member-since" class="text-secondary mb-0"></p>
                </div>
                <span id="seller-listings-count-badge" class="badge rounded-pill text-bg-light border fs-6"></span>
              </div>
            </div>
          </article>

          <section>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="h4 mb-0">Active Listings</h2>
            </div>

            <div id="seller-listings-empty" class="alert alert-info d-none" role="alert">
              This seller has no active listings right now. Check back soon for new items.
            </div>

            <div id="seller-listings-grid" class="row g-4"></div>
          </section>
        </section>
      </section>
    </main>

    <div id="footer-root"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/seller.js"></script>
    <script type="module" src="../js/footer.js"></script>
  </body>
</html>
